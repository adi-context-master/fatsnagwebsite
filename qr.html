<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fat Snag — Scan to join the waitlist</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F7F2E8;
    --dark: #1A1208;
    --yellow: #FABF2A;
    --red: #D63C1E;
  }

  html, body {
    height: 100%;
    background: var(--yellow);
    color: var(--dark);
    font-family: 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    min-height: 100vh;
  }

  .card {
    background: var(--cream);
    border-radius: 24px;
    padding: 48px 48px 40px;
    text-align: center;
    box-shadow: 0 30px 60px -20px rgba(26, 18, 8, 0.3);
    max-width: 560px;
    width: 100%;
    border: 1px solid rgba(26, 18, 8, 0.12);
  }

  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    font-weight: 500;
    color: var(--red);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .headline {
    font-size: 40px;
    line-height: 1.05;
    font-weight: 500;
    letter-spacing: -0.03em;
    color: var(--dark);
    margin-bottom: 12px;
  }
  .headline .accent { color: var(--red); }

  .sub {
    font-size: 16px;
    color: var(--dark);
    opacity: 0.75;
    margin-bottom: 32px;
    line-height: 1.5;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
  }

  .qr-frame {
    background: var(--cream);
    border: 2px solid var(--dark);
    border-radius: 18px;
    padding: 22px;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1/1;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .qr-frame img {
    width: 100%;
    height: 100%;
    display: block;
  }
  .qr-frame.loading {
    background: rgba(26, 18, 8, 0.04);
    color: rgba(26, 18, 8, 0.4);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .url-line {
    font-size: 13px;
    color: var(--dark);
    opacity: 0.65;
    word-break: break-all;
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .url-line strong {
    font-weight: 600;
    opacity: 1;
    color: var(--dark);
  }

  .footer-tag {
    display: inline-block;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--dark);
    background: var(--yellow);
    padding: 6px 12px;
    border-radius: 100px;
  }

  @media (max-width: 520px) {
    .card { padding: 32px 24px 28px; border-radius: 18px; }
    .headline { font-size: 30px; }
    .sub { font-size: 14px; margin-bottom: 24px; }
    .qr-frame { padding: 16px; max-width: 280px; }
  }

  @media (min-width: 1100px) {
    .card { max-width: 640px; padding: 64px 64px 56px; }
    .headline { font-size: 52px; }
    .sub { font-size: 17px; margin-bottom: 36px; }
    .qr-frame { max-width: 420px; padding: 28px; }
  }
</style>
</head>
<body>

<div class="card">
  <div class="eyebrow">Fat Snag · Founding Waitlist</div>
  <h1 class="headline">Scan to <span class="accent">join the waitlist</span>.</h1>
  <p class="sub">Open your phone camera, point it at the code below, and tap the link that appears.</p>

  <div class="qr-frame">
    <img src="assets/waitlist-qr.png" alt="QR code linking to the Fat Snag waitlist at fatsnag.com/#waitlist">
  </div>

  <div class="url-line">or open <strong>fatsnag.com/#waitlist</strong></div>

  <div class="footer-tag">Limited founding spots · 2026</div>
</div>

</body>
</html>
